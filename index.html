<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<title>Kaikudata – syvyyskartta</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; overscroll-behavior: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b0b16;
  }

  /* ---- Map (rotating container, oversized so corners never show white) ---- */
  #map {
    position: fixed;
    top: -30%; left: -30%;
    width: 160%; height: 160%;
    transform-origin: 50% 50%;
    transform: rotate(0deg);
    --counter-rot: 0deg;
    background: #0b0b16;
    z-index: 1;
  }
  .depth-canvas { pointer-events: none; }

  /* Keep text/icons upright when the map is rotated (heading-up) */
  .lbl-inner {
    transform: rotate(var(--counter-rot, 0deg));
    font-size: 12px; font-weight: 700; color: #fff;
    text-shadow: 0 0 3px #000, 0 0 3px #000, 1px 1px 2px #000;
    white-space: nowrap; text-align: center; line-height: 1;
    pointer-events: none; user-select: none;
  }
  .wpt-wrap {
    transform: rotate(var(--counter-rot, 0deg));
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
  }
  .wpt-fish {
    font-size: 11px; line-height: 1; text-shadow: 0 0 4px #000, 0 0 4px #000;
    transform: scale(var(--fish-scale, 1)); transform-origin: center center;
  }
  .wpt-depth {
    font-size: 11px; font-weight: 700; color: #fff; line-height: 1; margin-top: 1px;
    text-shadow: 0 0 3px #000, 0 0 3px #000, 1px 1px 2px #000; white-space: nowrap;
  }

  /* Light, near-B&W basemap; partial grayscale keeps a faint blue on water
     (land in the MML map is ~white, so it stays neutral). */
  .leaflet-tile-pane { filter: grayscale(0.72) saturate(1.35) brightness(1.22) contrast(0.9); }

  /* ---- Own location marker ---- */
  .loc-wrap { position: relative; width: 40px; height: 40px; transform: scale(1.2); }
  .loc-arrow {
    position: absolute; left: 50%; top: 50%;
    width: 0; height: 0;
    margin-left: -11px; margin-top: -30px;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-bottom: 20px solid #2b8cff;
    filter: drop-shadow(0 0 2px rgba(0,0,0,.6));
    transform-origin: 11px 30px;
    transform: rotate(0deg);
  }
  .loc-dot {
    position: absolute; left: 50%; top: 50%;
    width: 16px; height: 16px; margin: -8px 0 0 -8px;
    background: #2b8cff; border: 3px solid #fff; border-radius: 50%;
    box-shadow: 0 0 6px rgba(0,0,0,.5);
  }

  /* ---- Top bar ---- */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(26,26,46,.95);
    color: #fff;
    padding: calc(env(safe-area-inset-top, 0px) + 8px) 8px 8px 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
  }
  #btnrow { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: #2b2b4a; color: #fff; border: none; border-radius: 8px;
    padding: 0 14px; min-height: 44px; font-size: 15px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .btn:active { background: #3a3a63; }
  .btn.warn { background: #6a2233; }
  .btn.active { background: #2b8cff; }

  /* Waypoint edit popup */
  .btn2 {
    background: #2b2b4a; color: #fff; border: none; border-radius: 6px;
    padding: 7px 10px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .btn2.del { background: #6a2233; }
  .wpt-edit { font-size: 13px; min-width: 150px; }
  .wpt-edit label { display: block; margin-bottom: 6px; color: #333; }
  .wpt-edit input {
    width: 100%; padding: 6px; font-size: 15px; box-sizing: border-box;
    border: 1px solid #ccc; border-radius: 5px;
  }
  .wpt-edit-row { display: flex; gap: 8px; margin-top: 4px; }
  .wpt-edit-row .btn2 { flex: 1; }

  /* User waypoint pins */
  .uwpt-wrap {
    transform: rotate(var(--counter-rot, 0deg));
    display: flex; flex-direction: column; align-items: center; cursor: pointer;
  }
  .uwpt-pin { font-size: 22px; line-height: 1; filter: drop-shadow(0 0 3px #000); }
  .uwpt-depth {
    font-size: 11px; font-weight: 700; color: #fff; line-height: 1; margin-top: -2px;
    text-shadow: 0 0 3px #000, 0 0 3px #000, 1px 1px 2px #000; white-space: nowrap;
  }

  /* Measure readout */
  #measureReadout {
    position: fixed; top: calc(env(safe-area-inset-top,0px) + 120px);
    left: 50%; transform: translateX(-50%); z-index: 1100;
    background: rgba(43,140,255,.95); color: #fff; padding: 6px 12px;
    border-radius: 8px; font-size: 14px; font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); display: none; white-space: nowrap;
  }
  #filelist { margin-top: 8px; max-height: 22vh; overflow-y: auto; }
  .file-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; padding: 4px 2px; border-top: 1px solid rgba(255,255,255,.08);
  }
  .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .count { color: #9aa; font-variant-numeric: tabular-nums; }
  .file-item .del {
    background: none; border: none; color: #ff8080; font-size: 18px;
    cursor: pointer; padding: 4px; line-height: 1;
  }
  #summary { font-size: 12px; color: #9aa; margin-top: 6px; }

  /* ---- Right-side control buttons ---- */
  #sidectrl {
    position: fixed; top: calc(env(safe-area-inset-top,0px) + 96px); right: 10px;
    z-index: 1000; display: flex; flex-direction: column; gap: 10px;
  }
  .ctrl {
    width: 48px; height: 48px; border-radius: 10px; border: none;
    background: rgba(26,26,46,.92); color: #fff; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); cursor: pointer;
  }
  .ctrl:active { background: #3a3a63; }
  .ctrl.active { background: #2b8cff; }

  /* ---- Locate button (big, when no location) ---- */
  #locateBtn {
    position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 16px);
    right: 12px; z-index: 1000;
    background: #2b8cff; color: #fff; border: none; border-radius: 24px;
    padding: 0 18px; height: 48px; font-size: 15px; font-weight: 700;
    box-shadow: 0 2px 8px rgba(0,0,0,.4); cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }

  /* ---- Legend ---- */
  #legend {
    position: fixed; left: 10px; bottom: calc(env(safe-area-inset-bottom,0px) + 12px);
    z-index: 1000; background: rgba(11,11,22,.8); color: #fff;
    padding: 8px 10px; border-radius: 8px; font-size: 11px; line-height: 1.5;
  }
  #legend .row { display: flex; align-items: center; gap: 6px; }
  #legend .sw { width: 14px; height: 14px; border-radius: 3px; }
  #legend b { display: block; margin-bottom: 4px; font-size: 12px; }

  /* ---- Hover/tap depth tooltip ---- */
  #tip {
    position: fixed; z-index: 1200; pointer-events: none;
    background: rgba(0,0,0,.8); color: #fff; padding: 3px 7px;
    border-radius: 5px; font-size: 13px; font-weight: 700;
    transform: translate(-50%, -140%); display: none; white-space: nowrap;
  }

  #toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    z-index: 1500; background: rgba(0,0,0,.85); color: #fff;
    padding: 8px 14px; border-radius: 8px; font-size: 13px;
    display: none; max-width: 80vw; text-align: center;
  }

  .leaflet-container { background: #0b0b16; }
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div id="btnrow">
    <button class="btn" id="loadBtn">📁 Lataa GPX</button>
    <button class="btn" id="addWptBtn">➕ Merkki</button>
    <button class="btn" id="measureBtn">📏 Mittaa</button>
    <button class="btn" id="exportBtn">💾 Vie</button>
    <button class="btn warn" id="clearBtn">🗑 Tyhjennä</button>
  </div>
  <div id="filelist"></div>
  <div id="summary">Ei ladattua dataa. Valitse GPX-tiedostoja.</div>
</div>

<div id="sidectrl">
  <button class="ctrl active" id="viewBtn" title="Näkymä: pinta / pisteet">🌊</button>
  <button class="ctrl" id="rotBtn" title="Kartan suunta">🔓</button>
  <button class="ctrl" id="zoomBtn" title="Zoom-lukitus">🔍</button>
  <button class="ctrl" id="unitBtn" title="Yksikkö metri/jalka">m</button>
</div>

<button id="locateBtn">📍 Hae sijainti</button>

<div id="legend"></div>

<div id="tip"></div>
<div id="toast"></div>
<div id="measureReadout"></div>

<input type="file" id="fileInput" accept=".gpx,application/gpx+xml,application/xml,text/xml" multiple style="display:none">

<script>
"use strict";

/* ========================================================================
   Kaikudata – kaikuluotaimen GPX-syvyysdatan interaktiivinen kartta
   ======================================================================== */

const RAY_NS = "http://www.raymarine.com";

/* ---------- Depth -> color (reversed: shallow = purple, deep = green) ---------- */
const BOUNDS = [2, 5, 8, 12, 18];
const COLORS = ["#8800ff", "#ff2200", "#ff8800", "#ffdd00", "#00dd44", "#00ff88"];
const DEEP_WHITE_M = 20;   // metres – deeper areas render white (safe/open water)
function depthColor(d) {
  if (d >= DEEP_WHITE_M) return "#ffffff";
  for (let i = 0; i < BOUNDS.length; i++) if (d < BOUNDS[i]) return COLORS[i];
  return COLORS[COLORS.length - 1];
}

/* ---------- View mode: interpolated surface / raw points / both ---------- */
let viewMode = "surface";                                  // "surface" | "points" | "both"
function surfaceMode() { return viewMode === "surface" || viewMode === "both"; }
function pointsMode()  { return viewMode === "points"  || viewMode === "both"; }

/* ---------- Units (metres / feet) ---------- */
let useFeet = false;
const FT = 3.28084;
function unit() { return useFeet ? "ft" : "m"; }
function fmtShort(m) { const v = useFeet ? m * FT : m; return useFeet ? v.toFixed(0) : v.toFixed(1); }
function fmtFull(m)  { const v = useFeet ? m * FT : m; return (useFeet ? v.toFixed(0) : v.toFixed(2)) + " " + unit(); }

/* ---------- Map ---------- */
const map = L.map("map", {
  center: [62.426, 26.080],
  zoom: 14,
  zoomControl: false,
  attributionControl: true,
  preferCanvas: true,
});

L.tileLayer(
  "https://avoin-karttakuva.maanmittauslaitos.fi/avoin/wmts/1.0.0/maastokartta/default/WGS84_Pseudo-Mercator/{z}/{y}/{x}.png?api-key=8ed41c4f-ff68-42a3-ae7a-970474a60cd3",
  { maxZoom: 19, minZoom: 5, attribution: "© Maanmittauslaitos", crossOrigin: true, opacity: 1 }
).addTo(map);

/* ========================================================================
   Custom canvas layer that draws all depth points in one pass (fast for 50k+)
   ======================================================================== */
const DepthLayer = L.Layer.extend({
  initialize() {
    this._pts = [];        // {lat, lon, depth}
    this._visible = [];    // {x, y, depth} in container pixels (for labels + hover)
    this._frame = null;
  },
  setPoints(pts) { this._pts = pts; this._schedule(); },
  onAdd(map) {
    this._map = map;
    const canvas = this._canvas = L.DomUtil.create("canvas", "depth-canvas");
    const pane = map.getPanes().overlayPane;
    pane.appendChild(canvas);
    map.on("move zoom viewreset resize zoomanim", this._schedule, this);
    map.on("moveend zoomend", this._onMoveEnd, this);
    this._reset();
  },
  onRemove(map) {
    L.DomUtil.remove(this._canvas);
    map.off("move zoom viewreset resize zoomanim", this._schedule, this);
    map.off("moveend zoomend", this._onMoveEnd, this);
  },
  _schedule() {
    if (this._frame) return;
    this._frame = requestAnimationFrame(() => { this._frame = null; this._reset(); });
  },
  _onMoveEnd() { this._reset(); rebuildLabels(); },
  _reset() {
    const map = this._map;
    if (!map) return;
    const size = map.getSize();
    const canvas = this._canvas;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    // position the canvas over the current viewport
    const topLeft = map.containerPointToLayerPoint([0, 0]);
    L.DomUtil.setPosition(canvas, topLeft);
    if (canvas.width !== size.x * dpr || canvas.height !== size.y * dpr) {
      canvas.width = size.x * dpr; canvas.height = size.y * dpr;
      canvas.style.width = size.x + "px"; canvas.style.height = size.y + "px";
    }

    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, size.x, size.y);
    ctx.globalAlpha = 0.45;  // GPX-syvyyspisteet läpikuultavina, tausta näkyy läpi

    const b = map.getBounds();
    const pad = 0.15;
    const latMin = b.getSouth() - (b.getNorth() - b.getSouth()) * pad;
    const latMax = b.getNorth() + (b.getNorth() - b.getSouth()) * pad;
    const lonMin = b.getWest() - (b.getEast() - b.getWest()) * pad;
    const lonMax = b.getEast() + (b.getEast() - b.getWest()) * pad;

    const pts = this._pts;
    const vis = this._visible = [];
    const draw = pointsMode();   // in surface-only mode we still build _visible (labels/hover)
    let lastColor = null;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      if (p.lat < latMin || p.lat > latMax || p.lon < lonMin || p.lon > lonMax) continue;
      const cp = map.latLngToContainerPoint([p.lat, p.lon]);
      if (draw) {
        const col = depthColor(p.depth);
        if (col !== lastColor) { ctx.fillStyle = col; lastColor = col; }
        ctx.beginPath();
        ctx.arc(cp.x, cp.y, 3.9, 0, 6.283185307179586);
        ctx.fill();
      }
      vis.push({ x: cp.x, y: cp.y, depth: p.depth });
    }
  },
});
const depthLayer = new DepthLayer().addTo(map);

/* ========================================================================
   Interpolated depth surface
   Renders a filled, colour-ramped surface ONLY where the data supports it:
     • A lone track line is given ~15 m width (SINGLE_HALF_M each side).
     • The gap between two lines is filled only when their separation
       (distance through the cell to a point on the opposite side) is < GAP_MAX_M.
   Depth is interpolated with inverse-distance weighting over nearby points.
   Everything is done in screen pixels (converted from metres via metres/pixel)
   so it follows zoom and the heading-up rotation for free.
   ======================================================================== */
const SINGLE_HALF_M = 7.5;   // half-width of a lone line  -> ~15 m band
const GAP_MAX_M     = 50;    // fill between two lines only if closer than this
const IDW_RADIUS_M  = 30;    // depth-interpolation neighbourhood
const CELL_PX       = 4;     // surface raster resolution (screen px per cell)

map.createPane("surface");
map.getPane("surface").style.zIndex = 350;        // below overlayPane (points=400)
map.getPane("surface").style.pointerEvents = "none";

const SurfaceLayer = L.Layer.extend({
  initialize() { this._pts = []; },
  setPoints(pts) { this._pts = pts; this._render(); },
  onAdd(map) {
    this._map = map;
    const canvas = this._canvas = L.DomUtil.create("canvas", "surface-canvas");
    canvas.style.pointerEvents = "none";
    map.getPane("surface").appendChild(canvas);
    map.on("moveend zoomend resize", this._render, this);
    map.on("zoomstart", this._hide, this);
    this._render();
  },
  onRemove(map) {
    L.DomUtil.remove(this._canvas);
    map.off("moveend zoomend resize", this._render, this);
    map.off("zoomstart", this._hide, this);
  },
  redraw() { this._render(); },
  _hide() { if (this._canvas) this._canvas.style.visibility = "hidden"; },
  _render() {
    const map = this._map, canvas = this._canvas;
    if (!map || !canvas) return;
    const size = map.getSize();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);

    L.DomUtil.setPosition(canvas, map.containerPointToLayerPoint([0, 0]));
    if (canvas.width !== size.x * dpr || canvas.height !== size.y * dpr) {
      canvas.width = size.x * dpr; canvas.height = size.y * dpr;
      canvas.style.width = size.x + "px"; canvas.style.height = size.y + "px";
    }
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, size.x, size.y);
    if (surfaceMode() && this._pts.length) this._paint(ctx, size, map);
    canvas.style.visibility = "visible";
  },
  _paint(ctx, size, map) {
    // metres-per-pixel at the current view (roughly constant across a viewport)
    const c = map.getCenter();
    const pc = map.latLngToContainerPoint(c);
    const c2 = map.containerPointToLatLng([pc.x + 64, pc.y]);
    const mpp = (map.distance(c, c2) / 64) || 1;

    const rSingle = SINGLE_HALF_M / mpp;   // px
    const rGap    = GAP_MAX_M / mpp;        // px – search radius for the opposite side
    const rIdw    = IDW_RADIUS_M / mpp;     // px

    // project points to container px, keep those near the padded viewport
    const padPx = rGap + 4;
    const pxpts = [];
    for (const p of this._pts) {
      const cp = map.latLngToContainerPoint([p.lat, p.lon]);
      if (cp.x < -padPx || cp.x > size.x + padPx || cp.y < -padPx || cp.y > size.y + padPx) continue;
      pxpts.push({ x: cp.x, y: cp.y, depth: p.depth });
    }
    if (!pxpts.length) return;

    // bucket grid for neighbour queries (bucket edge = search radius)
    const B = Math.max(8, Math.ceil(rGap));
    const buckets = new Map();
    for (const p of pxpts) {
      const k = Math.floor(p.x / B) + "," + Math.floor(p.y / B);
      let arr = buckets.get(k); if (!arr) buckets.set(k, arr = []);
      arr.push(p);
    }
    const collect = (x, y) => {
      const bx = Math.floor(x / B), by = Math.floor(y / B), out = [];
      for (let gx = bx - 1; gx <= bx + 1; gx++)
        for (let gy = by - 1; gy <= by + 1; gy++) {
          const arr = buckets.get(gx + "," + gy);
          if (arr) for (const p of arr) out.push(p);
        }
      return out;
    };

    const rSingle2 = rSingle * rSingle, rGap2 = rGap * rGap, rIdw2 = rIdw * rIdw;

    ctx.globalAlpha = 0.65;
    for (let y = 0; y < size.y; y += CELL_PX) {
      for (let x = 0; x < size.x; x += CELL_PX) {
        const cx = x + CELL_PX / 2, cy = y + CELL_PX / 2;
        const cand = collect(cx, cy);
        if (!cand.length) continue;

        // nearest point (a) + its direction vector
        let a2 = Infinity, ax = 0, ay = 0;
        for (const p of cand) {
          const dx = p.x - cx, dy = p.y - cy, d2 = dx * dx + dy * dy;
          if (d2 < a2) { a2 = d2; ax = dx; ay = dy; }
        }
        if (a2 > rGap2) continue;
        const a = Math.sqrt(a2);

        let covered = a2 <= rSingle2;                    // rule A: lone-line band
        if (!covered) {
          // rule B: closest point on the OPPOSITE side; fill if a + b < GAP_MAX
          let b = Infinity;
          for (const p of cand) {
            const dx = p.x - cx, dy = p.y - cy;
            if (dx * ax + dy * ay >= 0) continue;        // same side as nearest
            const bb = Math.sqrt(dx * dx + dy * dy);
            if (bb < b) b = bb;
          }
          if (b < Infinity && (a + b) <= rGap) covered = true;
        }
        if (!covered) continue;

        // inverse-distance-weighted depth from nearby points
        let ws = 0, ds = 0;
        for (const p of cand) {
          const dx = p.x - cx, dy = p.y - cy, d2 = dx * dx + dy * dy;
          if (d2 > rIdw2) continue;
          const w = 1 / (d2 + 1);
          ws += w; ds += w * p.depth;
        }
        const depth = ws > 0 ? ds / ws : cand.reduce((m, p) => {
          const dx = p.x - cx, dy = p.y - cy, d2 = dx * dx + dy * dy;
          return d2 < m.d ? { d: d2, v: p.depth } : m;
        }, { d: Infinity, v: 0 }).v;

        ctx.fillStyle = depthColor(depth);
        ctx.fillRect(x, y, CELL_PX, CELL_PX);
      }
    }
  },
});
const surfaceLayer = new SurfaceLayer().addTo(map);

/* ---------- Fish waypoint symbols scale with the map (fixed ground size) ---------- */
const FISH_METERS = 20;    // waypoint fish drawn ~20 m wide on the ground
const FISH_BASE_PX = 11;   // matches .wpt-fish base font-size
function updateFishScale() {
  const c = map.getCenter();
  const pc = map.latLngToContainerPoint(c);
  const c2 = map.containerPointToLatLng([pc.x + 64, pc.y]);
  const mpp = (map.distance(c, c2) / 64) || 1;
  const scale = (FISH_METERS / mpp) / FISH_BASE_PX;
  document.getElementById("map").style.setProperty("--fish-scale", scale.toFixed(3));
}
map.on("zoomend", updateFishScale);

/* ---------- Label + waypoint + location layers ---------- */
const labelLayer   = L.layerGroup().addTo(map);
const wptLayer     = L.layerGroup().addTo(map);
const userWptLayer = L.layerGroup().addTo(map);
const measureLayer = L.layerGroup().addTo(map);

/* ========================================================================
   Depth text labels – one per grid cell, choosing the local extreme point
   ======================================================================== */
function rebuildLabels() {
  labelLayer.clearLayers();
  const vis = depthLayer._visible;
  if (!vis.length) return;

  const CELL = 80;
  const cells = new Map();
  for (const p of vis) {
    const cx = Math.floor(p.x / CELL), cy = Math.floor(p.y / CELL);
    const key = cx + "_" + cy;
    let c = cells.get(key);
    if (!c) { c = { cx, cy, sum: 0, n: 0, min: p, max: p }; cells.set(key, c); }
    c.sum += p.depth; c.n++;
    if (p.depth < c.min.depth) c.min = p;
    if (p.depth > c.max.depth) c.max = p;
  }

  const cellAvg = (cx, cy) => {
    const c = cells.get(cx + "_" + cy);
    return c ? c.sum / c.n : null;
  };

  for (const c of cells.values()) {
    const a = c.sum / c.n;
    let nsum = 0, nn = 0;
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      if (!dx && !dy) continue;
      const na = cellAvg(c.cx + dx, c.cy + dy);
      if (na != null) { nsum += na; nn++; }
    }
    const nAvg = nn ? nsum / nn : a;
    // local high -> deepest point, local low -> shallowest point
    const pick = a >= nAvg ? c.max : c.min;
    const ll = map.containerPointToLatLng([pick.x, pick.y]);
    const icon = L.divIcon({
      className: "",
      html: '<div class="lbl-inner">' + fmtShort(pick.depth) + "</div>",
      iconSize: [40, 14], iconAnchor: [20, 7],
    });
    L.marker(ll, { icon, interactive: false, keyboard: false }).addTo(labelLayer);
  }
}

/* ========================================================================
   Data model
   ======================================================================== */
let files = [];          // {id, name, points:[], wpts:[]}
let nextId = 1;
let userWpts = [];       // {id, lat, lon, name, depth} – user-created, editable
let wptNextId = 1;
let interactMode = null; // null | "addwpt" | "measure"
let measurePts = [];     // [L.LatLng] for the measuring tool

function rebuildData() {
  const flat = [];
  wptLayer.clearLayers();
  for (const f of files) {
    for (const p of f.points) flat.push(p);
    for (const w of f.wpts) addWaypointMarker(w);
  }
  depthLayer.setPoints(flat);
  surfaceLayer.setPoints(flat);
  rebuildLabels();
  renderFileList(flat.length);
  persistState();
}

function addWaypointMarker(w) {
  const depthTxt = w.depth != null
    ? '<div class="wpt-depth">' + fmtShort(w.depth) + "</div>" : "";
  const icon = L.divIcon({
    className: "",
    html: '<div class="wpt-wrap"><div class="wpt-fish">🐟</div>' + depthTxt + "</div>",
    iconSize: [60, 46], iconAnchor: [30, 14],
  });
  const m = L.marker([w.lat, w.lon], { icon, zIndexOffset: 1000 });
  let html = "<b>" + escapeHtml(w.name || "Waypoint") + "</b>";
  if (w.depth != null) html += "<br>Syvyys: " + fmtFull(w.depth);
  m.bindPopup(html);
  m.addTo(wptLayer);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

/* ---------- GPX parsing ---------- */
function getDepth(el) {
  let d = el.getElementsByTagNameNS(RAY_NS, "WaterDepth");
  if (!d.length) {
    // fallback: match by local name regardless of namespace resolution
    const all = el.getElementsByTagName("*");
    for (const e of all) if (e.localName === "WaterDepth") { d = [e]; break; }
  }
  if (d.length) {
    const v = parseFloat(d[0].textContent);
    if (!isNaN(v)) return v;
  }
  return null;
}

function parseGpx(text, name) {
  const doc = new DOMParser().parseFromString(text, "application/xml");
  if (doc.getElementsByTagName("parsererror").length)
    throw new Error("GPX-jäsennys epäonnistui");

  const points = [];
  const trkpts = doc.getElementsByTagName("trkpt");
  for (const t of trkpts) {
    const lat = parseFloat(t.getAttribute("lat"));
    const lon = parseFloat(t.getAttribute("lon"));
    if (isNaN(lat) || isNaN(lon)) continue;
    const depth = getDepth(t);
    if (depth == null) continue;
    points.push({ lat, lon, depth });
  }

  const wpts = [];
  const wptEls = doc.getElementsByTagName("wpt");
  for (const w of wptEls) {
    const lat = parseFloat(w.getAttribute("lat"));
    const lon = parseFloat(w.getAttribute("lon"));
    if (isNaN(lat) || isNaN(lon)) continue;
    const nameEl = w.getElementsByTagName("name")[0];
    wpts.push({
      lat, lon,
      name: nameEl ? nameEl.textContent.trim() : "",
      depth: getDepth(w),
    });
  }
  return { id: nextId++, name, points, wpts };
}

async function loadFiles(fileList) {
  const arr = Array.from(fileList);
  let added = 0, allBounds = [];
  for (const file of arr) {
    try {
      const text = await file.text();
      const parsed = parseGpx(text, file.name);
      files.push(parsed);
      added += parsed.points.length + parsed.wpts.length;
      for (const p of parsed.points) allBounds.push([p.lat, p.lon]);
      for (const w of parsed.wpts) allBounds.push([w.lat, w.lon]);
    } catch (e) {
      toast("Virhe: " + file.name + " – " + e.message);
    }
  }
  rebuildData();
  if (allBounds.length) {
    try { map.fitBounds(allBounds, { padding: [40, 40], maxZoom: 16 }); } catch (_) {}
  }
  if (added) toast(added + " pistettä lisätty");
}

function renderFileList(totalPts) {
  const list = document.getElementById("filelist");
  list.innerHTML = "";
  for (const f of files) {
    const div = document.createElement("div");
    div.className = "file-item";
    const n = f.points.length + f.wpts.length;
    div.innerHTML =
      '<span class="name">' + escapeHtml(f.name) + "</span>" +
      '<span class="count">' + n + " p</span>" +
      '<button class="del" title="Poista">🗑</button>';
    div.querySelector(".del").onclick = () => {
      files = files.filter(x => x.id !== f.id);
      rebuildData();
    };
    list.appendChild(div);
  }
  const sum = document.getElementById("summary");
  if (files.length) {
    const wpts = files.reduce((a, f) => a + f.wpts.length, 0);
    sum.textContent = files.length + " tiedostoa · " +
      (totalPts - wpts) + " syvyyspistettä · " + wpts + " waypointia";
  } else {
    sum.textContent = "Ei ladattua dataa. Valitse GPX-tiedostoja.";
  }
}

/* ========================================================================
   Persistence – keep loaded data + own marks across reloads (IndexedDB)
   ======================================================================== */
const DB_NAME = "kaikudata-db", STORE = "kv", STATE_KEY = "state";
let _db = null;
function openDb() {
  return new Promise((resolve) => {
    let req;
    try { req = indexedDB.open(DB_NAME, 1); } catch (_) { return resolve(null); }
    req.onupgradeneeded = () => req.result.createObjectStore(STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}
function dbGet(key) {
  return new Promise((res) => {
    if (!_db) return res(undefined);
    try {
      const r = _db.transaction(STORE, "readonly").objectStore(STORE).get(key);
      r.onsuccess = () => res(r.result); r.onerror = () => res(undefined);
    } catch (_) { res(undefined); }
  });
}
function dbPut(key, val) {
  return new Promise((res) => {
    if (!_db) return res();
    try {
      const tx = _db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).put(val, key);
      tx.oncomplete = () => res(); tx.onerror = () => res();
    } catch (_) { res(); }
  });
}
let _persistTimer = null;
function persistState() {
  if (!_db) return;
  clearTimeout(_persistTimer);
  _persistTimer = setTimeout(() => dbPut(STATE_KEY, { nextId, files, userWpts, wptNextId }), 400);
}

/* ---------- Small UI prefs in localStorage (unit + view mode) ---------- */
function savePrefs() {
  try { localStorage.setItem("kaikudata-prefs", JSON.stringify({ unit: unit(), view: viewMode })); } catch (_) {}
}
function restorePrefs() {
  try {
    const pr = JSON.parse(localStorage.getItem("kaikudata-prefs") || "{}");
    if (pr.unit) useFeet = pr.unit === "ft";
    if (pr.view === "surface" || pr.view === "points" || pr.view === "both") viewMode = pr.view;
  } catch (_) {}
}

/* ========================================================================
   User waypoints – add / edit / delete, draggable pins with an edit popup
   ======================================================================== */
function renderUserWpts() {
  userWptLayer.clearLayers();
  for (const w of userWpts) addUserWptMarker(w);
}
function addUserWptMarker(w) {
  const depthTxt = w.depth != null ? '<div class="uwpt-depth">' + fmtShort(w.depth) + "</div>" : "";
  const icon = L.divIcon({
    className: "",
    html: '<div class="uwpt-wrap"><div class="uwpt-pin">📍</div>' + depthTxt + "</div>",
    iconSize: [40, 44], iconAnchor: [20, 40],
  });
  const m = L.marker([w.lat, w.lon], { icon, draggable: true, zIndexOffset: 1500 });
  m._wid = w.id;
  m.on("dragend", () => { const ll = m.getLatLng(); w.lat = ll.lat; w.lon = ll.lng; persistState(); });
  m.bindPopup(() => userWptPopupHtml(w), { minWidth: 170 });
  m.on("popupopen", (e) => wireWptPopup(e.popup, w, m));
  m.addTo(userWptLayer);
}
function userWptPopupHtml(w) {
  return '<div class="wpt-edit">' +
    '<label>Nimi<br><input class="wname" value="' + escapeHtml(w.name || "") + '"></label>' +
    '<label>Syvyys (m)<br><input class="wdepth" type="number" step="0.1" value="' +
      (w.depth != null ? w.depth : "") + '"></label>' +
    '<div class="wpt-edit-row"><button class="btn2 save">Tallenna</button>' +
    '<button class="btn2 del">Poista</button></div></div>';
}
function wireWptPopup(popup, w, marker) {
  const el = popup.getElement();
  if (!el) return;
  const nameI = el.querySelector(".wname"), depthI = el.querySelector(".wdepth");
  el.querySelector(".save").onclick = () => {
    w.name = nameI.value.trim();
    const dv = parseFloat(depthI.value);
    w.depth = isNaN(dv) ? null : dv;
    marker.closePopup();
    renderUserWpts();
    persistState();
    toast("Merkki tallennettu");
  };
  el.querySelector(".del").onclick = () => {
    userWpts = userWpts.filter(x => x.id !== w.id);
    marker.closePopup();
    renderUserWpts();
    persistState();
    toast("Merkki poistettu");
  };
}
function addUserWaypoint(latlng) {
  const w = { id: wptNextId++, lat: latlng.lat, lon: latlng.lng, name: "", depth: null };
  userWpts.push(w);
  renderUserWpts();
  persistState();
  userWptLayer.eachLayer(m => { if (m._wid === w.id) m.openPopup(); });
}

/* ========================================================================
   Distance measuring – tap to drop vertices, running total shown
   ======================================================================== */
const measureReadout = document.getElementById("measureReadout");
function addMeasurePoint(latlng) { measurePts.push(latlng); redrawMeasure(); }
function redrawMeasure() {
  measureLayer.clearLayers();
  if (measurePts.length) {
    L.polyline(measurePts, { color: "#2b8cff", weight: 3, dashArray: "6 4" }).addTo(measureLayer);
    for (const p of measurePts)
      L.circleMarker(p, { radius: 4, color: "#fff", weight: 2, fillColor: "#2b8cff", fillOpacity: 1 })
        .addTo(measureLayer);
  }
  let total = 0;
  for (let i = 1; i < measurePts.length; i++)
    total += haversine(measurePts[i-1].lat, measurePts[i-1].lng, measurePts[i].lat, measurePts[i].lng);
  measureReadout.textContent = measurePts.length < 2 ? "📏 Napauta pisteitä" : "📏 " + fmtDist(total);
}
function fmtDist(m) {
  if (useFeet) { const ft = m * FT; return ft >= 6076 ? (ft / 6076.12).toFixed(2) + " NM" : Math.round(ft) + " ft"; }
  return m >= 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m";
}
function clearMeasure() { measurePts = []; measureLayer.clearLayers(); }

/* ========================================================================
   Interaction modes (add waypoint / measure) + GPX export
   ======================================================================== */
function ensureNorthUp() {
  // CSS-rotated map confuses click→latlng, so lock north while editing
  if (headingUp && haveHeading) {
    headingUp = false; updateRotBtn(); applyMapRotation();
    toast("Kartta lukittu pohjoiseen muokkausta varten");
  }
}
function setMode(mode) {
  interactMode = (interactMode === mode) ? null : mode;
  addWptBtn.classList.toggle("active", interactMode === "addwpt");
  measureBtn.classList.toggle("active", interactMode === "measure");
  measureReadout.style.display = interactMode === "measure" ? "block" : "none";
  if (interactMode) ensureNorthUp();
  if (interactMode === "measure") { clearMeasure(); redrawMeasure(); }
  else clearMeasure();
  toast(interactMode === "addwpt" ? "Napauta kartalle lisätäksesi merkin"
      : interactMode === "measure" ? "Napauta kartalle mittausta varten"
      : "Muokkaustila pois");
}
function exportGpx() {
  if (!userWpts.length && measurePts.length < 2) { toast("Ei omia merkkejä tai reittiä vietäväksi"); return; }
  let g = '<?xml version="1.0" encoding="UTF-8"?>\n' +
    '<gpx version="1.1" creator="Kaikudata" xmlns="http://www.topografix.com/GPX/1/1" ' +
    'xmlns:raymarine="http://www.raymarine.com">\n';
  for (const w of userWpts) {
    g += '  <wpt lat="' + w.lat.toFixed(6) + '" lon="' + w.lon.toFixed(6) + '">' +
         '<name>' + escapeHtml(w.name || "Waypoint") + "</name>";
    if (w.depth != null)
      g += '<extensions><raymarine:WaterDepth>' + w.depth.toFixed(2) + "</raymarine:WaterDepth></extensions>";
    g += "</wpt>\n";
  }
  if (measurePts.length > 1) {
    g += "  <trk><name>Kaikudata-reitti</name><trkseg>\n";
    for (const p of measurePts)
      g += '    <trkpt lat="' + p.lat.toFixed(6) + '" lon="' + p.lng.toFixed(6) + '"></trkpt>\n';
    g += "  </trkseg></trk>\n";
  }
  g += "</gpx>\n";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([g], { type: "application/gpx+xml" }));
  a.download = "kaikudata-omat.gpx";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  toast("GPX viety");
}

/* ---------- Toast ---------- */
let toastTimer = null;
function toast(msg, ms) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, ms || 2500);
}

/* ========================================================================
   Hover / tap tooltip showing depth of nearest point
   ======================================================================== */
const tip = document.getElementById("tip");
function findNearest(cp) {
  const vis = depthLayer._visible;
  let best = null, bestD = 14 * 14; // px^2 threshold
  for (const p of vis) {
    const dx = p.x - cp.x, dy = p.y - cp.y;
    const d = dx * dx + dy * dy;
    if (d < bestD) { bestD = d; best = p; }
  }
  return best;
}
map.on("mousemove", (e) => {
  const p = findNearest(e.containerPoint);
  if (p) {
    tip.textContent = fmtFull(p.depth);
    tip.style.left = e.originalEvent.clientX + "px";
    tip.style.top = e.originalEvent.clientY + "px";
    tip.style.display = "block";
  } else tip.style.display = "none";
});
map.on("mouseout", () => { tip.style.display = "none"; });
map.on("click", (e) => {
  if (interactMode === "addwpt")  { addUserWaypoint(e.latlng); return; }
  if (interactMode === "measure") { addMeasurePoint(e.latlng); return; }
  const p = findNearest(e.containerPoint);
  if (p) {
    tip.textContent = fmtFull(p.depth);
    tip.style.left = e.originalEvent.clientX + "px";
    tip.style.top = e.originalEvent.clientY + "px";
    tip.style.display = "block";
    clearTimeout(tip._t);
    tip._t = setTimeout(() => { tip.style.display = "none"; }, 1800);
  }
});

/* ========================================================================
   Own location + heading (GPS bearing, compass fallback)
   ======================================================================== */
let locMarker = null, locArrow = null;
let watchId = null;
let lastFix = null;          // {lat, lon, t}
let heading = 0;             // degrees, 0 = north
let haveHeading = false;
let compassHeading = null;
let gotFix = false;          // true once a real position has arrived

let headingUp = true;        // default: map rotates so course is up
let zoomLocked = false;

function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }
function bearing(a, b, c, d) {
  const φ1 = toRad(a), φ2 = toRad(c), Δλ = toRad(d - b);
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}
function haversine(a, b, c, d) {
  const R = 6371000;
  const dφ = toRad(c - a), dλ = toRad(d - b);
  const s = Math.sin(dφ / 2) ** 2 + Math.cos(toRad(a)) * Math.cos(toRad(c)) * Math.sin(dλ / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

function ensureLocMarker(lat, lon) {
  if (!locMarker) {
    const icon = L.divIcon({
      className: "",
      html: '<div class="loc-wrap"><div class="loc-arrow"></div><div class="loc-dot"></div></div>',
      iconSize: [40, 40], iconAnchor: [20, 20],
    });
    locMarker = L.marker([lat, lon], { icon, zIndexOffset: 2000, interactive: false }).addTo(map);
    locArrow = locMarker.getElement().querySelector(".loc-arrow");
  } else {
    locMarker.setLatLng([lat, lon]);
    if (!locArrow) locArrow = locMarker.getElement().querySelector(".loc-arrow");
  }
}

function applyHeadingArrow() {
  if (locArrow) locArrow.style.transform = "rotate(" + heading + "deg)";
}

function applyMapRotation() {
  const mapEl = document.getElementById("map");
  if (headingUp && haveHeading) {
    mapEl.style.transform = "rotate(" + (-heading) + "deg)";
    mapEl.style.setProperty("--counter-rot", heading + "deg");
  } else {
    mapEl.style.transform = "rotate(0deg)";
    mapEl.style.setProperty("--counter-rot", "0deg");
  }
  updateDragging();
}

// Manual drag only makes sense when the map is NOT visually rotated
// (Leaflet's pointer math is unaware of the CSS rotation).
function updateDragging() {
  if (headingUp && haveHeading) map.dragging.disable();
  else map.dragging.enable();
}

function onPosition(pos) {
  const lat = pos.coords.latitude, lon = pos.coords.longitude;
  const t = pos.timestamp;
  ensureLocMarker(lat, lon);

  // First real fix: reveal the marker & retire the locate button
  if (!gotFix) {
    gotFix = true;
    const btn = document.getElementById("locateBtn");
    if (btn) btn.style.display = "none";
    if (!headingUp) map.panTo([lat, lon], { animate: true, duration: 0.4 });
  }

  // heading from GPS course if available, else derive from movement
  if (pos.coords.heading != null && !isNaN(pos.coords.heading) &&
      pos.coords.speed != null && pos.coords.speed > 0.5) {
    heading = pos.coords.heading; haveHeading = true;
  } else if (lastFix) {
    const dist = haversine(lastFix.lat, lastFix.lon, lat, lon);
    if (dist > 3) { heading = bearing(lastFix.lat, lastFix.lon, lat, lon); haveHeading = true; }
    else if (compassHeading != null) { heading = compassHeading; haveHeading = true; }
  } else if (compassHeading != null) {
    heading = compassHeading; haveHeading = true;
  }
  lastFix = { lat, lon, t };

  applyHeadingArrow();
  applyMapRotation();

  if (headingUp) map.panTo([lat, lon], { animate: true, duration: 0.4 });
}

function startLocation() {
  if (!("geolocation" in navigator)) { toast("Paikannus ei ole tuettu tässä selaimessa", 6000); return; }
  if (!window.isSecureContext) {
    toast("Paikannus vaatii suojatun yhteyden – avaa julkaistu https-osoite", 7000);
    return;
  }
  requestOrientationPermission();

  const btn = document.getElementById("locateBtn");
  if (btn) { btn.disabled = true; btn.innerHTML = "⏳ Haetaan sijaintia…"; }
  toast("Haetaan sijaintia…");

  // Restart cleanly so the "Yritä uudelleen" button always re-triggers a fresh request.
  if (watchId != null) navigator.geolocation.clearWatch(watchId);

  // Quick single shot (often arrives before the first watch callback), then continuous tracking.
  const opts = { enableHighAccuracy: true, maximumAge: 1000, timeout: 20000 };
  navigator.geolocation.getCurrentPosition(onPosition, () => {},
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 });
  watchId = navigator.geolocation.watchPosition(onPosition, onGeoError, opts);
}

function onGeoError(err) {
  let msg;
  if (err.code === 1)      msg = "Sijaintilupa evätty – salli sijainti selaimen ja puhelimen asetuksista, ja yritä uudelleen.";
  else if (err.code === 2) msg = "Sijaintia ei saada – tarkista GPS/paikannus ja yritä ulkona.";
  else if (err.code === 3) msg = "Paikannus aikakatkaistiin – yritä uudelleen.";
  else                     msg = "Paikannusvirhe: " + (err && err.message || "tuntematon");
  toast(msg, 6000);

  // No fix yet → give the button back so the user can retry.
  if (!gotFix) {
    const btn = document.getElementById("locateBtn");
    if (btn) { btn.disabled = false; btn.style.display = "inline-flex"; btn.innerHTML = "📍 Yritä uudelleen"; }
  }
}

/* ---------- Compass fallback (used only when nearly stationary) ---------- */
function handleOrientation(e) {
  let h = null;
  if (typeof e.webkitCompassHeading === "number") h = e.webkitCompassHeading; // iOS
  else if (e.alpha != null && e.absolute) h = (360 - e.alpha) % 360;
  if (h != null) compassHeading = h;
}
function requestOrientationPermission() {
  const DOE = window.DeviceOrientationEvent;
  if (DOE && typeof DOE.requestPermission === "function") {
    DOE.requestPermission().then(state => {
      if (state === "granted") window.addEventListener("deviceorientation", handleOrientation, true);
    }).catch(() => {});
  } else if (DOE) {
    window.addEventListener("deviceorientationabsolute", handleOrientation, true);
    window.addEventListener("deviceorientation", handleOrientation, true);
  }
}

document.getElementById("locateBtn").onclick = startLocation;

/* ---------- View mode button (surface / points / both) ---------- */
const viewBtn = document.getElementById("viewBtn");
const VIEW_ICON = { surface: "🌊", both: "🌀", points: "⬤" };
const VIEW_TXT  = { surface: "Interpoloitu pinta", both: "Pinta + pisteet", points: "Syvyyspisteet" };
function applyViewMode() {
  viewBtn.textContent = VIEW_ICON[viewMode];
  viewBtn.classList.toggle("active", viewMode !== "points");
  viewBtn.title = "Näkymä: " + VIEW_TXT[viewMode];
  depthLayer._reset();
  surfaceLayer._render();
  rebuildLabels();
}
viewBtn.onclick = () => {
  viewMode = viewMode === "surface" ? "both" : viewMode === "both" ? "points" : "surface";
  applyViewMode();
  savePrefs();
  toast(VIEW_TXT[viewMode]);
};

/* ---------- Rotation lock button ---------- */
const rotBtn = document.getElementById("rotBtn");
function updateRotBtn() {
  rotBtn.textContent = headingUp ? "🔓" : "🔒";
  rotBtn.classList.toggle("active", headingUp);
  rotBtn.title = headingUp ? "Kartta pyörii (kulkusuunta ylös)" : "Kartta lukittu pohjoiseen";
}
rotBtn.onclick = () => {
  headingUp = !headingUp;
  updateRotBtn();
  applyMapRotation();
  if (headingUp && lastFix) map.panTo([lastFix.lat, lastFix.lon]);
  setTimeout(() => { map.invalidateSize(false); depthLayer._reset(); surfaceLayer._render(); rebuildLabels(); }, 30);
};

/* ---------- Zoom lock button ---------- */
const zoomBtn = document.getElementById("zoomBtn");
function applyZoomLock() {
  if (zoomLocked) {
    map.touchZoom.disable(); map.doubleClickZoom.disable();
    map.scrollWheelZoom.disable(); map.boxZoom.disable();
  } else {
    map.touchZoom.enable(); map.doubleClickZoom.enable();
    map.scrollWheelZoom.enable(); map.boxZoom.enable();
  }
  zoomBtn.textContent = zoomLocked ? "🔒" : "🔍";
  zoomBtn.classList.toggle("active", zoomLocked);
  zoomBtn.title = zoomLocked ? "Zoom lukittu" : "Lukitse zoom";
}
zoomBtn.onclick = () => { zoomLocked = !zoomLocked; applyZoomLock(); };

/* ---------- Legend (built dynamically so it follows the unit) ---------- */
function buildLegend() {
  const el = document.getElementById("legend");
  const conv = x => useFeet ? Math.round(x * FT) : +x.toFixed(1);
  let h = "<b>Syvyys (" + unit() + ")</b>";
  let lo = 0;
  for (let i = 0; i < COLORS.length && lo < DEEP_WHITE_M; i++) {
    const hi = Math.min(i < BOUNDS.length ? BOUNDS[i] : DEEP_WHITE_M, DEEP_WHITE_M);
    const label = (lo === 0 ? "0" : conv(lo)) + "–" + conv(hi);
    h += '<div class="row"><span class="sw" style="background:' + COLORS[i] + '"></span> ' + label + "</div>";
    lo = i < BOUNDS.length ? BOUNDS[i] : DEEP_WHITE_M;
  }
  h += '<div class="row"><span class="sw" style="background:#fff;border:1px solid #889"></span> ' +
       conv(DEEP_WHITE_M) + "+</div>";
  el.innerHTML = h;
}

/* ---------- Unit toggle (m / ft) ---------- */
const unitBtn = document.getElementById("unitBtn");
unitBtn.onclick = () => {
  useFeet = !useFeet;
  unitBtn.textContent = unit();
  unitBtn.classList.toggle("active", useFeet);
  buildLegend();
  rebuildData();       // re-renders depth labels + waypoint depth texts in new unit
  renderUserWpts();    // own-mark depth texts too
  if (interactMode === "measure") redrawMeasure();
  savePrefs();
};

/* ---------- Find the bounds of the densest cluster of points ---------- */
/* Bins points into a grid, picks the fullest cell, returns the bounds of
   that cell plus its 8 neighbours (a 3x3 block) for a nicely framed view. */
function densestBounds(pts) {
  if (!pts.length) return null;
  let minLat = Infinity, maxLat = -Infinity, minLon = Infinity, maxLon = -Infinity;
  for (const p of pts) {
    if (p.lat < minLat) minLat = p.lat; if (p.lat > maxLat) maxLat = p.lat;
    if (p.lon < minLon) minLon = p.lon; if (p.lon > maxLon) maxLon = p.lon;
  }
  const N = 40;
  const dLat = (maxLat - minLat) / N || 1e-9;
  const dLon = (maxLon - minLon) / N || 1e-9;
  const grid = new Map();
  let best = null, bestCount = 0;
  for (const p of pts) {
    const r = Math.min(N, Math.floor((p.lat - minLat) / dLat));
    const c = Math.min(N, Math.floor((p.lon - minLon) / dLon));
    const k = r * (N + 2) + c;
    const n = (grid.get(k) || 0) + 1;
    grid.set(k, n);
    if (n > bestCount) { bestCount = n; best = { r, c }; }
  }
  if (!best) return null;
  const loLat = Math.max(minLat + (best.r - 1) * dLat, minLat);
  const hiLat = Math.min(minLat + (best.r + 2) * dLat, maxLat);
  const loLon = Math.max(minLon + (best.c - 1) * dLon, minLon);
  const hiLon = Math.min(minLon + (best.c + 2) * dLon, maxLon);
  return [[loLat, loLon], [hiLat, hiLon]];
}

/* ---------- Preload bundled sample data on the computer ---------- */
async function loadPreset(url, name) {
  try {
    const res = await fetch(url);
    if (!res.ok) return;
    const parsed = parseGpx(await res.text(), name);
    files.push(parsed);
    rebuildData();
    map.invalidateSize(false);
    // Initial view: zoom to the densest cluster of depth points
    const dense = densestBounds(parsed.points);
    if (dense) {
      try { map.fitBounds(dense, { padding: [40, 40], maxZoom: 17 }); } catch (_) {}
    } else {
      const b = [];
      for (const p of parsed.points) b.push([p.lat, p.lon]);
      for (const w of parsed.wpts) b.push([w.lat, w.lon]);
      if (b.length) { try { map.fitBounds(b, { padding: [40, 40], maxZoom: 16 }); } catch (_) {} }
    }
    // ensure the canvas redraws once the map size/position has settled
    setTimeout(() => { map.invalidateSize(false); depthLayer._reset(); surfaceLayer._render(); rebuildLabels(); }, 250);
    toast(parsed.points.length + " pistettä esiladattu");
  } catch (_) { /* ignore (e.g. opened via file://) */ }
}

/* ---------- init ---------- */
restorePrefs();
unitBtn.textContent = unit();
unitBtn.classList.toggle("active", useFeet);
buildLegend();
applyViewMode();  // sync the view button + initial render state to the restored pref
updateRotBtn();
applyZoomLock();
updateDragging(); // no rotation yet -> panning enabled until GPS heading is active
updateFishScale();
setTimeout(() => map.invalidateSize(false), 200);

/* Restore persisted data if any; otherwise preload the bundled sample once. */
(async function initData() {
  _db = await openDb();
  const saved = await dbGet(STATE_KEY);
  if (saved === undefined) {
    // First ever run (no stored state) -> preload the bundled sample.
    loadPreset("sample/Archive_19_07_2026B_fixed.gpx", "Archive_19_07_2026B_fixed.gpx");
    return;
  }
  // A stored state exists (possibly empty after an explicit clear) -> respect it.
  files     = saved.files || [];
  userWpts  = saved.userWpts || [];
  nextId    = saved.nextId    || (files.reduce((m, f) => Math.max(m, f.id), 0) + 1);
  wptNextId = saved.wptNextId || (userWpts.reduce((m, w) => Math.max(m, w.id), 0) + 1);
  rebuildData();
  renderUserWpts();
  map.invalidateSize(false);
  const b = [];
  for (const f of files) {
    for (const p of f.points) b.push([p.lat, p.lon]);
    for (const w of f.wpts)   b.push([w.lat, w.lon]);
  }
  for (const w of userWpts) b.push([w.lat, w.lon]);
  if (b.length) {
    try { map.fitBounds(b, { padding: [40, 40], maxZoom: 16 }); } catch (_) {}
    toast("Aiempi data palautettu");
  }
  setTimeout(() => { map.invalidateSize(false); depthLayer._reset(); surfaceLayer._render(); rebuildLabels(); }, 250);
})();

/* ---------- offline service worker (auto-updating) ---------- */
if ("serviceWorker" in navigator) {
  let reloading = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if (reloading) return; reloading = true; location.reload();
  });
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then(reg => {
      reg.update();
      setInterval(() => reg.update(), 60 * 60 * 1000);
    }).catch(() => {});
  });
}
